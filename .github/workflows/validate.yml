name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
      - name: Schema + trust validation (hard gate)
        run: python scripts/validate_data.py
      - name: Frontend build
        run: python scripts/build_frontend.py
      - name: Aggregate integrity (committed frontend data must match the records)
        run: git diff --exit-code -- frontend/data
